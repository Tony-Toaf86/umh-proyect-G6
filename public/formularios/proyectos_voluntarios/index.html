<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Proyectos Voluntarios</title>
	<link rel="stylesheet" href="/parciales/estilos.css">
	<link rel="stylesheet" href="../estilos.css">
</head>
<body>
	<div id="header-container"></div>

	<main class="contenido-principal">
		<h1>Asignacion de Voluntarios a Proyectos</h1>
	</main>

	<div class="container">
		<form id="proyectoVoluntarioForm">
			<input type="hidden" id="original_proyecto_id">
			<input type="hidden" id="original_voluntario_id">

			<div class="form-group">
				<label for="proyecto_id">Proyecto:</label>
				<select id="proyecto_id" name="proyecto_id" required>
					<option value="">Selecciona un proyecto</option>
				</select>
			</div>

			<div class="form-group">
				<label for="voluntario_id">Voluntario:</label>
				<select id="voluntario_id" name="voluntario_id" required>
					<option value="">Selecciona un voluntario</option>
				</select>
			</div>

			<div class="form-group">
				<label for="fecha_asignacion">Fecha de Asignacion:</label>
				<input type="datetime-local" id="fecha_asignacion" name="fecha_asignacion">
			</div>

			<div class="form-actions">
				<button type="submit">Guardar</button>
				<button type="button" class="btn-actualizar">Actualizar</button>
				<button type="button" class="btn-eliminar">Eliminar</button>
				<button type="button" class="btn-listar">Listar</button>
			</div>
		</form>
		<div id="resultado"></div>
	</div>

	<div id="footer-container"></div>

	<script>
		async function cargarParcial(url, selector, contenedorId) {
			try {
				const respuesta = await fetch(url);
				if (!respuesta.ok) throw new Error(`No se pudo cargar ${url}`);

				const html = await respuesta.text();
				const doc = new DOMParser().parseFromString(html, 'text/html');
				const nodo = doc.querySelector(selector);

				document.getElementById(contenedorId).innerHTML = nodo
					? nodo.outerHTML
					: html;
			} catch (error) {
				console.error(error);
			}
		}

		cargarParcial('/parciales/header.html', 'header', 'header-container');
		cargarParcial('/parciales/footer.html', 'footer', 'footer-container');
	</script>
	<script src="/formularios/proyectos_voluntarios/proyectos_voluntarios.js"></script>
</body>
</html>
