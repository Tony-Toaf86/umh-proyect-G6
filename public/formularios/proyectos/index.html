<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Proyectos</title>
	<link rel="stylesheet" href="/parciales/estilos.css">
        <link rel="stylesheet" href="../estilos.css">

</head>
<body>
	<div id="header-container"></div>

	<main class="contenido-principal">
		<h1>Gestión de Proyectos</h1>
	</main>
    
<div class="container">
    <form id="proyectoForm">
        <input type="hidden" id="proyectoId">
        <div class="form-group">
			<label for="nombre">Nombre del Proyecto:</label>
			<input type="text" id="nombre" name="nombre" required>
		</div>
		<div class="form-group">
			<label for="descripcion">Descripcion:</label>
			<textarea id="descripcion" name="descripcion"></textarea>
		</div>
		<div class="form-group">
			<label for="fecha_inicio">Fecha de Inicio:</label>
			<input type="date" id="fecha_inicio" name="fecha_inicio">
        </div>
        <div class="form-group">
            <label for="organizacion_id">Organización Aliada:</label>
			<select id="organizacion_id" name="organizacion_id">
				<option value="">Selecciona una organizacion</option>
			</select>
        </div>
        <div class="form-actions">
            <button type="submit">Guardar</button>
            <button type="button" class="btn-actualizar">Actualizar</button>
            <button type="button" class="btn-eliminar">Eliminar</button>
            <button type="button" class="btn-listar">Listar</button>
        </div>
    </form>
    <div id="resultado"></div>
</div>

	<div id="footer-container"></div>

	<script>
		async function cargarParcial(url, selector, contenedorId) {
			try {
				const respuesta = await fetch(url);
				if (!respuesta.ok) throw new Error(`No se pudo cargar ${url}`);

				const html = await respuesta.text();
				const doc = new DOMParser().parseFromString(html, 'text/html');
				const nodo = doc.querySelector(selector);

				document.getElementById(contenedorId).innerHTML = nodo
					? nodo.outerHTML
					: html;
			} catch (error) {
				console.error(error);
			}
		}

		cargarParcial('/parciales/header.html', 'header', 'header-container');
		cargarParcial('/parciales/footer.html', 'footer', 'footer-container');
	</script>
</body>
</html>
