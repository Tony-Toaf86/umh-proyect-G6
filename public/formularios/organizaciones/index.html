<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Organizaciones</title>
	<link rel="stylesheet" href="/parciales/estilos.css">
    <link rel="stylesheet" href="../estilos.css">
</head>
<body>
	<div id="header-container"></div>

	<main class="contenido-principal">
		<h1>Gestión de Organizaciones</h1>
	</main>

<div class="container">
    <form id="orgForm">
        <input type="hidden" id="orgId">
        <div class="form-group">
            <label for="nombre">Nombre de Organización:</label>
			<input type="text" id="nombre" name="nombre" required>
        </div>
        <div class="form-group">
            <label for="contacto">Contacto (Tel/Email):</label>
			<input type="text" id="contacto" name="contacto">
		</div>
		<div class="form-group">
			<label for="tipo_convenio">Tipo de Convenio:</label>
			<input type="text" id="tipo_convenio" name="tipo_convenio" maxlength="50">
        </div>
        <div class="form-actions">
            <button type="submit">Guardar</button>
            <button type="button" class="btn-actualizar">Actualizar</button>
            <button type="button" class="btn-eliminar">Eliminar</button>
            <button type="button" class="btn-listar">Listar</button>
        </div>
    </form>
    <div id="resultado"></div>
</div>

	<div id="footer-container"></div>

	<script>
		async function cargarParcial(url, selector, contenedorId) {
			try {
				const respuesta = await fetch(url);
				if (!respuesta.ok) throw new Error(`No se pudo cargar ${url}`);

				const html = await respuesta.text();
				const doc = new DOMParser().parseFromString(html, 'text/html');
				const nodo = doc.querySelector(selector);

				document.getElementById(contenedorId).innerHTML = nodo
					? nodo.outerHTML
					: html;
			} catch (error) {
				console.error(error);
			}
		}

		cargarParcial('/parciales/header.html', 'header', 'header-container');
		cargarParcial('/parciales/footer.html', 'footer', 'footer-container');
	</script>
	<script src="/formularios/organizaciones/organizaciones.js"></script>
</body>
</html>
